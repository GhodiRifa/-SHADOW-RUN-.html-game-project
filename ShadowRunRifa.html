<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SHADOW RUN</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:#020810;width:100%;height:100dvh;
  overflow:hidden;touch-action:none;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  font-family:'Orbitron',monospace;
}
body{display:flex;flex-direction:column;align-items:center}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,200,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,200,.018) 1px,transparent 1px);
  background-size:40px 40px;animation:gm 9s linear infinite;pointer-events:none;z-index:0;
}
@keyframes gm{to{background-position:40px 40px}}

.container{
  position:relative;z-index:1;width:100%;max-width:640px;height:100dvh;
  padding:8px 14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;
}

/* ── TITLE ── */
.title-block{width:100%;text-align:center;flex-shrink:0}
.game-title{
  display:inline-block;font-size:clamp(20px,5.8vw,30px);font-weight:900;
  letter-spacing:.18em;transform:translateX(.09em);color:#00FFD1;
  text-shadow:0 0 18px rgba(0,255,209,.65);animation:tp 3s ease-in-out infinite;
}
.game-sub{
  display:inline-block;font-family:'Rajdhani',sans-serif;
  font-size:clamp(9px,2.3vw,12px);letter-spacing:.22em;transform:translateX(.11em);
  color:rgba(0,255,209,.38);
}
.desk-hint{
  font-family:'Rajdhani',sans-serif;font-size:clamp(10px,2.5vw,13px);
  font-weight:600;color:#FFB020;margin-top:3px;
}
@keyframes tp{
  0%,100%{text-shadow:0 0 18px rgba(0,255,209,.65)}
  50%{text-shadow:0 0 32px rgba(0,255,209,1),0 0 60px rgba(0,255,209,.3)}
}

/* ── TOPROW: HUD + mute/skin buttons ── */
.toprow{
  width:100%;display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.hud{flex:1;display:flex;justify-content:space-between}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.hud-lbl{
  font-family:'Rajdhani',sans-serif;font-size:clamp(9px,2.2vw,11px);
  letter-spacing:.16em;transform:translateX(.08em);color:rgba(0,255,209,.4);
}
.hud-val{font-size:clamp(15px,4.2vw,20px);font-weight:700;color:#00FFD1;min-width:52px;text-align:center}
.hud-val.hi{color:#FF2D78}.hud-val.lv{color:#B060FF}

.icon-btn{
  flex-shrink:0;width:clamp(36px,8vw,44px);height:clamp(36px,8vw,44px);
  background:rgba(0,255,209,.06);border:1px solid rgba(0,255,209,.28);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  font-size:clamp(14px,3.5vw,18px);
  transition:background .1s,border-color .1s;
}
.icon-btn:active,.icon-btn.on{background:rgba(0,255,209,.18);border-color:rgba(0,255,209,.7)}

/* ── CANVAS ── */
.cw{
  position:relative;width:100%;aspect-ratio:900/520;
  border:1.5px solid rgba(0,255,209,.25);border-radius:6px;overflow:hidden;flex-shrink:0;
}
.cw canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:-webkit-optimize-contrast}
.cw::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px);
}
.cn{position:absolute;width:11px;height:11px}
.cn.tl{top:0;left:0;border-top:1.5px solid #00FFD1;border-left:1.5px solid #00FFD1}
.cn.tr{top:0;right:0;border-top:1.5px solid #00FFD1;border-right:1.5px solid #00FFD1}
.cn.bl{bottom:0;left:0;border-bottom:1.5px solid #00FFD1;border-left:1.5px solid #00FFD1}
.cn.br{bottom:0;right:0;border-bottom:1.5px solid #00FFD1;border-right:1.5px solid #00FFD1}

/* ── SPEED BAR ── */
.speedbar-wrap{width:100%;display:flex;align-items:center;gap:8px;flex-shrink:0}
.speedbar-lbl{font-family:'Rajdhani',sans-serif;font-size:clamp(9px,2.2vw,11px);letter-spacing:.12em;color:rgba(0,255,209,.38);white-space:nowrap}
.speedbar-track{flex:1;height:5px;background:rgba(0,255,209,.1);border-radius:3px;overflow:hidden}
.speedbar-fill{height:100%;width:0%;background:linear-gradient(90deg,#00FFD1,#FF2D78);border-radius:3px;transition:width .5s ease}

/* ── JUMP BUTTON ── */
.jump-btn{
  width:100%;flex:1;min-height:60px;
  background:rgba(0,255,209,.05);border:2px solid rgba(0,255,209,.32);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  font-family:'Rajdhani',sans-serif;font-size:clamp(20px,5.5vw,28px);
  font-weight:600;color:rgba(0,255,209,.7);transition:background .08s,border-color .08s;
}
.jump-btn:active,.jump-btn.pr{background:rgba(0,255,209,.16);border-color:rgba(0,255,209,.85);color:#00FFD1}
.jump-btn-txt{display:inline-block;letter-spacing:.28em;transform:translateX(.14em)}

/* ── COPYRIGHT ── */
.copy{
  font-family:'Rajdhani',sans-serif;font-size:clamp(10px,2.4vw,13px);
  letter-spacing:.12em;font-weight:600;color:rgba(0,255,209,.5);text-align:center;flex-shrink:0;
}

/* ═══════════════════════════════════════════════════════════════════════
   SKIN MODAL
═══════════════════════════════════════════════════════════════════════ */
#skinModal{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(2,8,16,.95);
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:20px 16px;
}
#skinModal.open{display:flex}
.modal-title{
  font-size:clamp(16px,4.5vw,22px);font-weight:900;
  letter-spacing:.14em;transform:translateX(.07em);color:#00FFD1;
  text-shadow:0 0 16px rgba(0,255,209,.6);
}
.modal-sub{
  font-family:'Rajdhani',sans-serif;font-size:clamp(10px,2.5vw,13px);
  color:rgba(0,255,209,.45);letter-spacing:.08em;text-align:center;
}
.skin-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:500px;
}
.skin-card{
  border:1.5px solid rgba(0,255,209,.2);border-radius:8px;
  padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  background:rgba(0,255,209,.03);transition:all .12s;
  position:relative;overflow:hidden;
}
.skin-card.locked{opacity:.45;cursor:not-allowed}
.skin-card.active{border-color:#00FFD1;background:rgba(0,255,209,.12)}
.skin-card:not(.locked):not(.active):active{background:rgba(0,255,209,.08)}
.skin-preview{width:100%;aspect-ratio:1;border-radius:4px;overflow:hidden}
.skin-preview canvas{display:block;width:100%;height:100%}
.skin-name{
  font-size:clamp(7px,1.8vw,9px);font-weight:700;letter-spacing:.1em;
  color:#00FFD1;text-align:center;line-height:1.2;
}
.skin-req{
  font-family:'Rajdhani',sans-serif;font-size:clamp(7px,1.8vw,9px);
  color:rgba(255,176,32,.8);letter-spacing:.05em;text-align:center;
}
.skin-badge{
  position:absolute;top:3px;right:3px;
  font-size:10px;line-height:1;
}
.modal-close{
  font-family:'Rajdhani',sans-serif;font-size:clamp(13px,3.5vw,16px);
  font-weight:600;letter-spacing:.18em;color:rgba(0,255,209,.55);
  border:1px solid rgba(0,255,209,.28);border-radius:8px;
  padding:10px 28px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  background:rgba(0,255,209,.04);transition:background .1s;
}
.modal-close:active{background:rgba(0,255,209,.14)}

/* ── UNLOCK TOAST ── */
#toast{
  display:none;position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  z-index:998;background:rgba(2,8,16,.92);border:1.5px solid #FFB020;
  border-radius:10px;padding:10px 20px;text-align:center;
  animation:toastAnim .4s ease;white-space:nowrap;
}
#toast.show{display:block}
.toast-t{font-size:clamp(11px,3vw,14px);font-weight:900;letter-spacing:.12em;color:#FFB020}
.toast-s{font-family:'Rajdhani',sans-serif;font-size:clamp(9px,2.3vw,11px);color:rgba(255,176,32,.7)}
@keyframes toastAnim{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- ── SKIN MODAL ──────────────────────────────────────────────────────────── -->
<div id="skinModal">
  <div class="modal-title">SELECT SKIN</div>
  <div class="modal-sub" id="skinModalSub">Selesaikan level untuk membuka skin baru</div>
  <div class="skin-grid" id="skinGrid"></div>
  <button class="modal-close" id="skinClose">✕ &nbsp; TUTUP</button>
</div>

<!-- ── UNLOCK TOAST ─────────────────────────────────────────────────────────── -->
<div id="toast"><div class="toast-t" id="toastT"></div><div class="toast-s" id="toastS"></div></div>

<!-- ── MAIN UI ───────────────────────────────────────────────────────────────── -->
<div class="container">

  <div class="title-block">
    <div class="game-title">SHADOW RUN</div>
    <div class="game-sub">CYBER NINJA CHRONICLES</div>
    <div class="desk-hint">🖥️ &nbsp;Hidupkan Mode Desktop untuk performa terbaik</div>
  </div>

  <div class="toprow">
    <div class="hud">
      <div class="hud-item"><div class="hud-lbl">LEVEL</div><div class="hud-val lv" id="Lv">01</div></div>
      <div class="hud-item"><div class="hud-lbl">SCORE</div><div class="hud-val" id="Sc">000000</div></div>
      <div class="hud-item"><div class="hud-lbl">BEST</div><div class="hud-val hi" id="Hi">000000</div></div>
    </div>
    <div class="icon-btn" id="btnMute" title="Mute/Unmute">🔊</div>
    <div class="icon-btn" id="btnSkin" title="Skins">👘</div>
  </div>

  <div class="cw">
    <div class="cn tl"></div><div class="cn tr"></div>
    <div class="cn bl"></div><div class="cn br"></div>
    <canvas id="gc" width="900" height="520"></canvas>
  </div>

  <div class="speedbar-wrap">
    <div class="speedbar-lbl">SPEED</div>
    <div class="speedbar-track"><div class="speedbar-fill" id="spdBar"></div></div>
  </div>

  <button class="jump-btn" id="bJ"><span class="jump-btn-txt">▲ &nbsp; JUMP</span></button>

  <div class="copy">© 2026 GHODI RIFA PRAKOSO — ALL RIGHTS RESERVED</div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  AUDIO ENGINE  (Web Audio API — zero external files)
// ═══════════════════════════════════════════════════════════════════════════
let AC = null;   // AudioContext, created on first interaction
let muted = false;
let bgmPlaying = false;
let bgmNodes = [];   // keep refs so we can stop them

function getAC(){
  if(!AC){ AC = new (window.AudioContext||window.webkitAudioContext)(); }
  if(AC.state==='suspended') AC.resume();
  return AC;
}

// ── SFX helpers ─────────────────────────────────────────────────────────────
function sfxTone(freq, type, vol, dur, freqEnd){
  if(muted) return;
  const ac=getAC(), t=ac.currentTime;
  const osc=ac.createOscillator(), gain=ac.createGain();
  osc.type=type; osc.frequency.setValueAtTime(freq,t);
  if(freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd,t+dur);
  gain.gain.setValueAtTime(vol,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(t); osc.stop(t+dur);
}
function sfxNoise(vol, dur){
  if(muted) return;
  const ac=getAC(), t=ac.currentTime;
  const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=ac.createBufferSource(), gain=ac.createGain();
  src.buffer=buf; gain.gain.setValueAtTime(vol,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(gain); gain.connect(ac.destination); src.start(t);
}

// ── SFX presets ──────────────────────────────────────────────────────────────
const SFX = {
  jump:    ()=>{ sfxTone(280,'square',.12,.08,520); sfxTone(520,'sine',.06,.12,680); },
  land:    ()=>{ sfxNoise(.04,.04); sfxTone(110,'sine',.08,.06); },
  death:   ()=>{
    sfxTone(440,'sawtooth',.15,.06);
    setTimeout(()=>sfxTone(330,'sawtooth',.12,.06),60);
    setTimeout(()=>sfxTone(220,'sawtooth',.12,.08),120);
    setTimeout(()=>sfxNoise(.1,.25),180);
  },
  score:   ()=>{ sfxTone(660,'sine',.08,.06,880); sfxTone(880,'sine',.06,.08,1100); },
  unlock:  ()=>{
    [440,550,660,880].forEach((f,i)=>setTimeout(()=>sfxTone(f,'sine',.12,.1,f*1.1),i*80));
  },
  levelup: ()=>{
    [330,440,550,660,880].forEach((f,i)=>setTimeout(()=>sfxTone(f,'square',.09,.08,f*1.05),i*60));
  },
};

// ── BGM (chiptune arpeggios via oscillator scheduling) ───────────────────────
// Cyberpunk minor-key pattern: Am pentatonic-ish
const BGM_MELODY = [
  220,277,330,415, 330,277,220,185,
  220,330,440,554, 440,330,277,220,
  247,311,370,466, 370,311,247,185,
  196,247,294,370, 294,247,220,196,
];
const BGM_BASS = [
  110,110,138,138, 110,110,92,92,
  110,110,138,138, 110,110,138,138,
  123,123,155,155, 123,123,92,92,
  98,98,123,123,   98,98,110,110,
];
let bgmIdx=0, bgmTimer=null;

function bgmTick(){
  if(muted||!bgmPlaying) return;
  const ac=getAC(), t=ac.currentTime;
  const step=0.12;

  // melody
  const mFreq=BGM_MELODY[bgmIdx%BGM_MELODY.length];
  const mo=ac.createOscillator(), mg=ac.createGain();
  mo.type='square'; mo.frequency.value=mFreq*2;
  mg.gain.setValueAtTime(.03,t); mg.gain.exponentialRampToValueAtTime(0.001,t+step*.8);
  mo.connect(mg); mg.connect(ac.destination); mo.start(t); mo.stop(t+step);

  // bass (every 2 steps)
  if(bgmIdx%2===0){
    const bFreq=BGM_BASS[Math.floor(bgmIdx/2)%BGM_BASS.length];
    const bo=ac.createOscillator(), bg2=ac.createGain();
    bo.type='triangle'; bo.frequency.value=bFreq;
    bg2.gain.setValueAtTime(.06,t); bg2.gain.exponentialRampToValueAtTime(0.001,t+step*1.6);
    bo.connect(bg2); bg2.connect(ac.destination); bo.start(t); bo.stop(t+step*2);
  }

  // hi-hat noise every 4 steps
  if(bgmIdx%4===0){
    const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.03),ac.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const s=ac.createBufferSource(),g=ac.createGain();
    s.buffer=buf; g.gain.setValueAtTime(.015,t); g.gain.exponentialRampToValueAtTime(0.001,t+.025);
    s.connect(g); g.connect(ac.destination); s.start(t);
  }

  bgmIdx++;
  bgmTimer=setTimeout(bgmTick, step*1000);
}

function startBGM(){
  if(bgmPlaying) return;
  bgmPlaying=true; bgmIdx=0; bgmTick();
}
function stopBGM(){
  bgmPlaying=false;
  if(bgmTimer){ clearTimeout(bgmTimer); bgmTimer=null; }
}
function toggleMute(){
  muted=!muted;
  document.getElementById('btnMute').textContent = muted ? '🔇' : '🔊';
  document.getElementById('btnMute').classList.toggle('on', muted);
  if(muted) stopBGM();
  else if(state==='running') startBGM();
}

// ═══════════════════════════════════════════════════════════════════════════
//  SKINS
// ═══════════════════════════════════════════════════════════════════════════
// Each skin: {id, name, unlockLvl, palette:{body,eye,scarf,boost,glow}}
const SKINS = [
  { id:0, name:'SHADOW',   req:0,  palette:{body:'#0C0C1C',eye:'#00FFD1',scarf:'#FF2D78',boot:'#B060FF',glow:'#00FFD1',trail:'rgba(0,255,209,0.28)'} },
  { id:1, name:'INFERNO',  req:3,  palette:{body:'#1A0800',eye:'#FF6600',scarf:'#FF2200',boot:'#FFB020',glow:'#FF4400',trail:'rgba(255,100,0,0.28)'} },
  { id:2, name:'SPECTER',  req:5,  palette:{body:'#001A0A',eye:'#00FF88',scarf:'#00FFCC',boot:'#88FF00',glow:'#00FF88',trail:'rgba(0,255,136,0.28)'} },
  { id:3, name:'GOLDEN',   req:7,  palette:{body:'#1A1200',eye:'#FFD700',scarf:'#FFF0A0',boot:'#FFB020',glow:'#FFD700',trail:'rgba(255,215,0,0.28)'} },
  { id:4, name:'VOID',     req:10, palette:{body:'#0D0018',eye:'#CC00FF',scarf:'#FF00AA',boot:'#00CCFF',glow:'#CC00FF',trail:'rgba(200,0,255,0.28)'} },
  { id:5, name:'SAKURA',   req:4,  palette:{body:'#180010',eye:'#FF88CC',scarf:'#FF44AA',boot:'#FFAADD',glow:'#FF88CC',trail:'rgba(255,136,204,0.28)'} },
];

let currentSkinId = 0;
let maxLvlReached = parseInt(localStorage.getItem('srMaxLvl')||'0');
let unlockedSkins  = JSON.parse(localStorage.getItem('srSkins')||'[0]');

function getSkin(){ return SKINS.find(s=>s.id===currentSkinId)||SKINS[0]; }
function skinUnlocked(s){ return unlockedSkins.includes(s.id)||s.req===0; }

function saveProgress(){
  localStorage.setItem('srMaxLvl', maxLvlReached);
  localStorage.setItem('srSkins',  JSON.stringify(unlockedSkins));
}

function checkUnlocks(newLvl){
  if(newLvl <= maxLvlReached) return;
  maxLvlReached = newLvl;
  SKINS.forEach(s=>{
    if(s.req>0 && s.req<=newLvl && !unlockedSkins.includes(s.id)){
      unlockedSkins.push(s.id);
      SFX.unlock();
      showToast('SKIN BARU TERBUKA!', s.name + ' — tap 👘 untuk pilih');
    }
  });
  saveProgress();
}

// ── Skin preview canvas ────────────────────────────────────────────────────
function drawSkinPreview(canvas, pal){
  const c=canvas.getContext('2d'), W=canvas.width, H=canvas.height;
  c.fillStyle='#020810'; c.fillRect(0,0,W,H);
  const s=W/60, x=W*.35, y=H*.88;
  // body
  c.fillStyle=pal.body; c.fillRect(x+4*s,y-46*s,22*s,20*s); c.fillRect(x+5*s,y-50*s,20*s,15*s);
  // eye
  c.fillStyle=pal.eye; c.fillRect(x+8*s,y-44*s,13*s,2*s); c.fillRect(x+10*s,y-48*s,4*s,2.5*s); c.fillRect(x+20*s,y-48*s,4*s,2.5*s);
  // scarf
  c.fillStyle=pal.scarf; c.fillRect(x+3*s,y-46*s,26*s,4*s);
  // boots
  c.fillStyle=pal.boot; c.fillRect(x+5*s,y-8*s,14*s,6*s); c.fillRect(x+16*s,y-8*s,14*s,6*s);
  // katana glow line
  c.fillStyle=pal.eye; c.fillRect(x+29*s,y-50*s,2*s,18*s);
  // ground line
  c.fillStyle=pal.glow; c.fillRect(0,y+2*s,W,2);
}

// ── Build skin modal ──────────────────────────────────────────────────────
function buildSkinModal(){
  const grid=document.getElementById('skinGrid');
  grid.innerHTML='';
  SKINS.forEach(skin=>{
    const card=document.createElement('div');
    card.className='skin-card'+(skinUnlocked(skin)?' ':' locked')+(skin.id===currentSkinId?' active':'');
    const pc=document.createElement('canvas'); pc.width=80; pc.height=80;
    pc.className='skin-preview';
    drawSkinPreview(pc, skin.palette);
    const nameEl=document.createElement('div'); nameEl.className='skin-name'; nameEl.textContent=skin.name;
    const reqEl=document.createElement('div'); reqEl.className='skin-req';
    const badge=document.createElement('div'); badge.className='skin-badge';
    if(!skinUnlocked(skin)){
      reqEl.textContent='LVL '+skin.req+' +';
      badge.textContent='🔒';
    } else if(skin.id===currentSkinId){
      reqEl.textContent='AKTIF';
      badge.textContent='✓';
    } else {
      reqEl.textContent='TERBUKA';
      badge.textContent='✨';
    }
    card.appendChild(pc); card.appendChild(nameEl); card.appendChild(reqEl); card.appendChild(badge);
    if(skinUnlocked(skin)){
      card.addEventListener('click',()=>{ currentSkinId=skin.id; buildSkinModal(); SFX.score(); });
    }
    grid.appendChild(card);
  });
  document.getElementById('skinModalSub').textContent =
    'Max level: '+maxLvlReached+' · '+unlockedSkins.length+'/'+SKINS.length+' skins terbuka';
}

function openSkinModal(){ buildSkinModal(); document.getElementById('skinModal').classList.add('open'); }
function closeSkinModal(){ document.getElementById('skinModal').classList.remove('open'); }

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTid=null;
function showToast(title, sub){
  const el=document.getElementById('toast');
  document.getElementById('toastT').textContent=title;
  document.getElementById('toastS').textContent=sub;
  el.classList.add('show');
  if(toastTid) clearTimeout(toastTid);
  toastTid=setTimeout(()=>el.classList.remove('show'),3000);
}

// ═══════════════════════════════════════════════════════════════════════════
//  GAME ENGINE
// ═══════════════════════════════════════════════════════════════════════════
const canvas=document.getElementById('gc');
const VW=900, VH=520;
const ctx=canvas.getContext('2d',{alpha:false});

const elSc=document.getElementById('Sc'),elHi=document.getElementById('Hi');
const elLv=document.getElementById('Lv'),elBar=document.getElementById('spdBar');

const CYN='#00FFD1',CYN2='rgba(0,255,209,0.28)',CYN3='rgba(0,255,209,0.08)';
const PNK='#FF2D78',PRP='#B060FF',AMB='#FFB020';
const AMB2='rgba(255,176,32,0.28)',PRP2='rgba(176,96,255,0.28)';

const GY=VH-75, GRAV=1080, JV=-480, BASE_SPD=250, MAX_SPD=750;

let state='idle',score=0,best=0,frame=0;
let spd=BASE_SPD,lvl=1,lastTs=0,gridOff=0;
let prevLvl=1, scoreMillestone=0;

const N={x:44,y:GY,w:32,h:50,vy:0,onGround:true,rf:0,rt:0,trail:[],tt:0};

let obs=[],oAcc=0,oNext=800;
let parts=[];
let farBlds=[],midBlds=[],strs=[],sigs=[];
const SIG_TXT=['忍者','HACK','RUN','危','CYBER','影','VOID','SYNC','刀','NEXUS'];

function rn(a,b){return a+Math.random()*(b-a)}
function ri(a,b){return 0|a+Math.random()*(b-a)}
function fmt(n){return(''+Math.floor(n)).padStart(6,'0')}

function buildWins(b){
  b.wins=[];
  const cols=0|b.w/14,rows=0|b.h/16;
  for(let r=0;r<rows;r++)
    for(let c=0;c<cols;c++)
      b.wins.push({on:Math.random()>.45,col:ri(0,3),ft:rn(0,100),flk:Math.random()>.85,_r:r,_c:c});
}
function initBG(){
  farBlds=[];midBlds=[];strs=[];sigs=[];
  for(let i=0;i<16;i++) farBlds.push({x:rn(0,VW*1.8),w:ri(28,80),h:ri(30,115),spd:50});
  for(let i=0;i<10;i++){const b={x:i*110+ri(0,50),w:ri(44,108),h:ri(52,130),spd:110,wins:[]};buildWins(b);midBlds.push(b);}
  for(let i=0;i<85;i++) strs.push({x:rn(0,VW),y:rn(0,VH*.55),r:rn(.3,1.3),spd:rn(5,20)});
  for(let i=0;i<5;i++) sigs.push({x:rn(0,VW*1.8),y:ri(22,115),txt:SIG_TXT[ri(0,SIG_TXT.length)],col:[CYN,PNK,PRP,AMB][ri(0,4)],spd:rn(32,62),flk:0});
}
initBG();

// ── Portal cache ──────────────────────────────────────────────────────────
const pCvs=document.createElement('canvas');
const pctx2=pCvs.getContext('2d');
function bakePortal(rx,ry){
  const pw=rx*2+20,ph=ry*2+20;
  pCvs.width=pw;pCvs.height=ph;pctx2.clearRect(0,0,pw,ph);
  const cx=pw/2,cy=ph/2;
  pctx2.strokeStyle=PRP2;pctx2.lineWidth=14;
  pctx2.beginPath();pctx2.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);pctx2.stroke();
  const rg=pctx2.createRadialGradient(cx,cy,0,cx,cy,rx);
  rg.addColorStop(0,'rgba(176,96,255,0.22)');rg.addColorStop(1,'rgba(176,96,255,0)');
  pctx2.fillStyle=rg;pctx2.beginPath();pctx2.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);pctx2.fill();
  pctx2.strokeStyle=PRP;pctx2.lineWidth=3;
  pctx2.beginPath();pctx2.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);pctx2.stroke();
  pctx2.strokeStyle=PNK;pctx2.lineWidth=2;
  pctx2.beginPath();pctx2.ellipse(cx,cy,rx*.6,ry*.6,0,0,Math.PI*2);pctx2.stroke();
}

// ── Draw Ninja (skin-aware) ───────────────────────────────────────────────
function drawNinja(x,y,rf,alpha){
  if(alpha<=0)return;
  const pal=getSkin().palette;
  const tr=getSkin().palette.trail;
  ctx.save();ctx.globalAlpha=alpha;
  const h=N.h,by=y-h;
  const leg=Math.sin(rf*.5)*11,arm=Math.sin(rf*.5)*5;
  if(alpha>.55){ctx.fillStyle=tr.replace('0.28',String(alpha*.35));ctx.fillRect(x-1,by-2,N.w+4,h+4);}
  ctx.fillStyle=pal.body;
  ctx.fillRect(x+4,by+15,23,21);ctx.fillRect(x+5,by,21,16);
  ctx.fillStyle=pal.eye;
  ctx.fillRect(x+8,by+7,14,2);ctx.fillRect(x+10,by+3,4,2.5);ctx.fillRect(x+20,by+3,4,2.5);
  ctx.fillStyle=pal.scarf;ctx.fillRect(x+3,by+14,26,4);
  ctx.fillStyle=pal.trail;ctx.fillRect(x+11,by+15,10,18);
  ctx.fillStyle=pal.body;
  ctx.fillRect(x,by+16+arm,6,15);ctx.fillRect(x+26,by+16-arm,6,15);
  ctx.fillStyle=pal.eye;ctx.fillRect(x+29,by,2,20);
  ctx.fillStyle=pal.trail;ctx.fillRect(x+31,by+2,2,15);
  ctx.fillStyle=pal.body;
  ctx.fillRect(x+7,by+35,8,h-35+leg);ctx.fillRect(x+18,by+35,8,h-35-leg);
  ctx.fillStyle=pal.boot;
  ctx.fillRect(x+5,by+h-9+leg,14,6);ctx.fillRect(x+16,by+h-9-leg,14,6);
  ctx.restore();
}

// ── Draw Obstacle ─────────────────────────────────────────────────────────
function drawObs(o){
  switch(o.type){
    case 'barrier':{
      ctx.fillStyle=CYN3;ctx.fillRect(o.x-2,o.y-o.h-4,o.w+4,o.h+6);
      ctx.fillStyle='#091E2C';ctx.fillRect(o.x,o.y-o.h,7,o.h);ctx.fillRect(o.x+o.w-7,o.y-o.h,7,o.h);
      ctx.fillStyle='rgba(0,255,209,0.06)';ctx.fillRect(o.x+7,o.y-o.h,o.w-14,o.h);
      ctx.fillStyle='rgba(0,255,209,0.12)';ctx.fillRect(o.x+7+(o.w-14)*.3,o.y-o.h,(o.w-14)*.4,o.h);
      ctx.fillStyle=CYN2;for(let sy=o.y-o.h+2;sy<o.y;sy+=5)ctx.fillRect(o.x+7,sy,o.w-14,1);
      ctx.fillStyle=CYN;ctx.fillRect(o.x,o.y-o.h-3,o.w,4);break;
    }
    case 'spike':{
      const seg=o.w/o.count;
      for(let i=0;i<o.count;i++){
        const sx=o.x+i*seg,sh=o.h+(i%2===0?9:0);
        ctx.fillStyle=i%2===0?'rgba(255,176,32,0.28)':'rgba(255,96,32,0.25)';
        ctx.fillRect(sx-1,GY-sh-1,seg+2,sh+2);
        ctx.fillStyle=i%2===0?AMB:'#FF6020';
        const half=seg*.5;
        for(let row=0;row<sh;row++){
          const t=row/sh,sw=Math.max(1,half*t*2);
          ctx.fillRect(sx+half-sw/2,GY-sh+row,sw,1);
        }
      }
      break;
    }
    case 'mech':{
      const mx=o.x,my=o.y;
      ctx.fillStyle=PRP2;ctx.fillRect(mx-2,my-o.h-2,o.w+4,o.h+4);
      ctx.fillStyle='#1E0628';ctx.fillRect(mx+4,my-20,9,20);ctx.fillRect(mx+o.w-13,my-20,9,20);
      ctx.fillStyle=PRP;ctx.fillRect(mx+2,my-4,14,5);ctx.fillRect(mx+o.w-16,my-4,14,5);
      ctx.fillStyle='#160524';ctx.fillRect(mx+2,my-o.h,o.w-4,o.h-20);
      ctx.fillStyle=PRP2;ctx.fillRect(mx+6,my-o.h+5,o.w-12,o.h-30);
      ctx.fillStyle='#1E0628';
      ctx.fillRect(mx,my-o.h+3,7,13);ctx.fillRect(mx+o.w-7,my-o.h+3,7,13);
      ctx.fillRect(mx+6,my-o.h-13,o.w-12,15);
      ctx.fillStyle=PNK;ctx.fillRect(mx+9,my-o.h-9,o.w-18,5);
      ctx.fillStyle=PRP;ctx.fillRect(mx+o.w/2-4,my-o.h+9,8,8);break;
    }
    case 'portal':{
      const pls=0.82+Math.sin(frame*.1+o.ph)*.16;
      const rx=Math.round(o.w/2*pls),ry=Math.round(o.h/2);
      if(!o._baked||o._br!==rx){bakePortal(rx,ry);o._baked=true;o._br=rx;}
      const pw=pCvs.width,ph2=pCvs.height,cx=o.x+o.w/2,cy=o.y-o.h/2;
      ctx.drawImage(pCvs,cx-pw/2,cy-ph2/2,pw,ph2);break;
    }
  }
}

// ── Spawn ─────────────────────────────────────────────────────────────────
function spawnObs(){
  const pool=lvl<3?['barrier','spike','barrier','spike','mech']:['barrier','spike','mech','portal','barrier','spike','mech'];
  const type=pool[ri(0,pool.length)];
  switch(type){
    case 'barrier':obs.push({type,x:VW+20,y:GY,w:ri(22,46),h:ri(30,55)});break;
    case 'spike':  obs.push({type,x:VW+20,y:GY,w:ri(38,72),h:ri(20,38),count:ri(3,6)});break;
    case 'mech':   obs.push({type,x:VW+20,y:GY,w:ri(36,50),h:ri(50,68)});break;
    case 'portal': obs.push({type,x:VW+20,y:GY,w:48,h:ri(56,84),ph:rn(0,Math.PI*2),_baked:false});break;
  }
  const minG=Math.max(440,720-lvl*28),maxG=Math.max(640,1020-lvl*30);
  oNext=ri(minG,maxG);oAcc=0;
}

// ── Hitbox/Collision ──────────────────────────────────────────────────────
function hitbox(o){
  const m=9;
  switch(o.type){
    case 'barrier':return{x:o.x+m,y:o.y-o.h+m,w:o.w-m*2,h:o.h-m};
    case 'spike':  return{x:o.x+m,y:GY-o.h+7,  w:o.w-m*2,h:o.h-9};
    case 'mech':   return{x:o.x+m,y:o.y-o.h+m, w:o.w-m*2,h:o.h-m};
    case 'portal': return{x:o.x+10+m,y:o.y-o.h+10+m,w:o.w-20-m*2,h:o.h-20-m};
    default:       return{x:o.x,y:o.y-20,w:20,h:20};
  }
}
function collides(){
  const m=9,nh=N.h,nx=N.x+m,ny=N.y-nh+m,nw=N.w-m*2,nnh=nh-m*2;
  for(const o of obs){const h=hitbox(o);if(nx<h.x+h.w&&nx+nw>h.x&&ny<h.y+h.h&&ny+nnh>h.y)return true;}
  return false;
}

// ── Particles ─────────────────────────────────────────────────────────────
function addParts(x,y,col,n,type){
  for(let i=0;i<n;i++){
    const a=rn(0,Math.PI*2),sp=rn(40,type==='death'?280:170);
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(type==='death'?105:0),life:1,dec:rn(.8,1.6),r:rn(1.5,type==='death'?5:3),col});
  }
}

// ── Draw BG ───────────────────────────────────────────────────────────────
function drawBG(){
  ctx.fillStyle='#020810';ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle='rgba(0,255,209,0.022)';ctx.fillRect(0,VH*.3,VW,GY-VH*.3);
  ctx.fillStyle='#C8F0FF';ctx.globalAlpha=.58;
  for(const s of strs)ctx.fillRect(s.x-.5,s.y-.5,s.r*2,s.r*2);
  ctx.globalAlpha=1;
  for(const b of farBlds){
    ctx.fillStyle='#030D17';ctx.fillRect(b.x,GY-b.h,b.w,b.h);
    ctx.fillStyle='rgba(0,255,209,0.08)';
    for(let wy=GY-b.h+5;wy<GY-5;wy+=9)for(let wx=b.x+4;wx<b.x+b.w-4;wx+=9)if((wy+wx)%17<6)ctx.fillRect(wx,wy,2,2);
  }
  ctx.font='bold 11px Orbitron,monospace';
  for(const sg of sigs){if(sg.flk>0)continue;ctx.fillStyle=sg.col;ctx.globalAlpha=.46;ctx.fillText(sg.txt,sg.x,sg.y);}
  ctx.globalAlpha=1;
  for(const b of midBlds){
    ctx.fillStyle='#04151F';ctx.fillRect(b.x,GY-b.h,b.w,b.h);
    for(const w of b.wins){
      if(!w.on)continue;if(w.flk&&Math.sin(frame*.08+w.ft)>.4)continue;
      ctx.globalAlpha=.55;
      ctx.fillStyle=w.col===0?'rgba(0,255,209,0.55)':w.col===1?'rgba(176,96,255,0.45)':'rgba(255,176,32,0.38)';
      ctx.fillRect(b.x+3+w._c*13,GY-b.h+5+w._r*15,7,8);
    }
    ctx.globalAlpha=1;
  }
  ctx.fillStyle='#0A2030';ctx.fillRect(0,GY,VW,VH-GY);
  const gc=getSkin().palette.glow;
  ctx.fillStyle=gc;ctx.fillRect(0,GY,VW,2);
  ctx.fillStyle=CYN3;ctx.fillRect(0,GY+2,VW,6);
  ctx.fillStyle='rgba(0,255,209,0.08)';
  for(let gx=gridOff%55;gx<VW;gx+=55)ctx.fillRect(gx,GY,1,VH-GY);
}

// ── Overlays ──────────────────────────────────────────────────────────────
function drawIdle(){
  const pal=getSkin().palette;
  ctx.fillStyle='rgba(2,8,16,0.75)';ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle=pal.glow;ctx.font='900 38px Orbitron,monospace';ctx.textAlign='center';
  ctx.fillText('SHADOW RUN',VW/2,VH/2-32);
  ctx.fillStyle=pal.scarf;ctx.font='700 13px Rajdhani,sans-serif';
  ctx.fillText('SKIN: '+getSkin().name,VW/2,VH/2-8);
  ctx.fillStyle='rgba(0,255,209,0.62)';ctx.font='600 15px Rajdhani,sans-serif';
  ctx.fillText('TAP  JUMP  TO  START',VW/2,VH/2+18);
  ctx.fillStyle='rgba(0,255,209,0.3)';ctx.font='600 11px Rajdhani,sans-serif';
  ctx.fillText('JUMP OVER ALL OBSTACLES',VW/2,VH/2+42);
  ctx.textAlign='left';
}
function drawDead(){
  ctx.fillStyle='rgba(2,8,16,0.76)';ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle=PNK;ctx.font='900 32px Orbitron,monospace';ctx.textAlign='center';
  ctx.fillText('MISSION FAILED',VW/2,VH/2-26);
  ctx.fillStyle=CYN;ctx.font='700 20px Orbitron,monospace';
  ctx.fillText('SCORE  '+fmt(score),VW/2,VH/2+10);
  ctx.fillStyle='rgba(0,255,209,0.52)';ctx.font='600 14px Rajdhani,sans-serif';
  ctx.fillText('TAP  JUMP  TO  RETRY',VW/2,VH/2+36);
  ctx.textAlign='left';
}

// ── Actions ───────────────────────────────────────────────────────────────
function doJump(){
  getAC(); // init AudioContext on first interaction
  if(state==='idle'||state==='dead'){startGame();return;}
  if(N.onGround){N.vy=JV;N.onGround=false;SFX.jump();addParts(N.x+N.w/2,N.y,getSkin().palette.glow,7,'jump');}
}

function startGame(){
  state='running';score=0;frame=0;spd=BASE_SPD;lvl=1;prevLvl=1;scoreMillestone=0;lastTs=0;
  obs=[];parts=[];oAcc=0;oNext=800;gridOff=0;
  N.y=GY;N.vy=0;N.onGround=true;N.rf=0;N.rt=0;N.trail=[];
  initBG();startBGM();
}

// ── Update ────────────────────────────────────────────────────────────────
function update(dt){
  if(state!=='running')return;
  frame++;
  const raw=BASE_SPD+Math.pow(score/55,1.2)*3.8;
  spd=Math.min(MAX_SPD,raw);
  lvl=Math.min(10,1+Math.floor(score/400));
  score+=spd*dt*.065;gridOff+=spd*dt;

  // level-up events
  if(lvl>prevLvl){
    SFX.levelup();
    checkUnlocks(lvl);
    prevLvl=lvl;
  }
  // score milestones
  const ms=Math.floor(score/500);
  if(ms>scoreMillestone){scoreMillestone=ms;SFX.score();}

  N.vy+=GRAV*dt;N.y+=N.vy*dt;
  if(N.y>=GY){
    if(!N.onGround)SFX.land();
    N.y=GY;N.vy=0;N.onGround=true;
  }
  N.rt+=dt;if(N.rt>=.07){N.rt=0;N.rf++;}
  N.tt+=dt;
  if(N.tt>=.06&&spd>370){N.tt=0;N.trail.push({x:N.x,y:N.y,a:.32});}
  N.trail=N.trail.filter(t=>{t.a-=1.8*dt;return t.a>0;});

  oAcc+=spd*dt;if(oAcc>=oNext)spawnObs();
  for(const o of obs)o.x-=spd*dt;
  obs=obs.filter(o=>o.x>-180);

  if(collides()){
    state='dead';if(score>best)best=score;
    stopBGM();SFX.death();
    addParts(N.x+N.w/2,N.y-N.h/2,PNK,22,'death');
    addParts(N.x+N.w/2,N.y-N.h/2,getSkin().palette.glow,12,'death');
    return;
  }

  for(const p of parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=GRAV*.28*dt;p.life-=p.dec*dt;}
  parts=parts.filter(p=>p.life>0);

  const sr=spd/BASE_SPD;
  for(const b of farBlds){b.x-=b.spd*.23*dt*sr;if(b.x+b.w<0){b.x=VW+ri(0,80);b.w=ri(28,80);b.h=ri(30,115);}}
  for(const b of midBlds){b.x-=b.spd*.55*dt*sr;if(b.x+b.w<0){b.x=VW+ri(0,60);b.w=ri(44,108);b.h=ri(52,130);buildWins(b);}}
  for(const s of strs){s.x-=s.spd*dt;if(s.x<0){s.x=VW;s.y=rn(0,VH*.55);}}
  for(const sg of sigs){
    sg.x-=sg.spd*dt*sr;if(sg.flk>0)sg.flk-=dt*25;if(Math.random()<.002)sg.flk=rn(4,18);
    if(sg.x<-80){sg.x=VW+ri(60,300);sg.txt=SIG_TXT[ri(0,SIG_TXT.length)];sg.col=[CYN,PNK,PRP,AMB][ri(0,4)];}
  }

  elSc.textContent=fmt(score);elHi.textContent=fmt(best);elLv.textContent=(''+lvl).padStart(2,'0');
  elBar.style.width=Math.min(100,((spd-BASE_SPD)/(MAX_SPD-BASE_SPD))*100)+'%';
}

// ── Draw ──────────────────────────────────────────────────────────────────
function draw(){
  drawBG();
  for(const t of N.trail)drawNinja(t.x,t.y,N.rf,t.a);
  for(const o of obs)drawObs(o);
  if(state!=='dead')drawNinja(N.x,N.y,N.rf,1);
  ctx.globalAlpha=1;
  for(const p of parts){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);}
  ctx.globalAlpha=1;
  if(state==='running'&&spd>430){
    ctx.globalAlpha=Math.min(.07,(spd-430)/5000);ctx.fillStyle=CYN;
    for(let k=0;k<8;k++){const ly=rn(5,GY-5),lx=rn(VW*.3,VW*.95),ll=rn(20,80);ctx.fillRect(lx-ll,ly,ll,1);}
    ctx.globalAlpha=1;
  }
  if(state==='idle')drawIdle();
  if(state==='dead')drawDead();
}

// ── Loop ──────────────────────────────────────────────────────────────────
function loop(ts){
  const dt=lastTs?Math.min((ts-lastTs)/1000,.05):.016;
  lastTs=ts;update(dt);draw();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Input ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doJump();}});
const bJ=document.getElementById('bJ');
bJ.addEventListener('touchstart',e=>{e.preventDefault();bJ.classList.add('pr');doJump();},{passive:false});
bJ.addEventListener('touchend',  e=>{e.preventDefault();bJ.classList.remove('pr');},{passive:false});
bJ.addEventListener('mousedown', ()=>doJump());
canvas.addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});
canvas.addEventListener('click',()=>doJump());
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

document.getElementById('btnMute').addEventListener('click',toggleMute);
document.getElementById('btnMute').addEventListener('touchstart',e=>{e.preventDefault();toggleMute();},{passive:false});
document.getElementById('btnSkin').addEventListener('click',openSkinModal);
document.getElementById('btnSkin').addEventListener('touchstart',e=>{e.preventDefault();openSkinModal();},{passive:false});
document.getElementById('skinClose').addEventListener('click',closeSkinModal);
document.getElementById('skinClose').addEventListener('touchstart',e=>{e.preventDefault();closeSkinModal();},{passive:false});
</script>
